# =============================================================
# ~/.tmux.conf — Tokyo Night + Wayland + Status Script
# =============================================================

# ── Prefixo ──────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Configurações gerais ──────────────────────────────────────
set -g history-limit 50000          # era 10000 → mais histórico
set -sg escape-time 0               # sem delay no Escape (neovim agradece)
set -g focus-events on              # eventos de foco para neovim/outros
set -g display-time 2000            # mensagens visíveis por 2s
set -g display-panes-time 2000
set -g base-index 1                 # windows começam em 1 (mais natural)
set -g pane-base-index 1            # panes também
set -g renumber-windows on          # renumera ao fechar uma window

# ── Terminal e cores ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'   # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── Change tab ─────────────────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Mouse ─────────────────────────────────────────────────────
set -g mouse on

# ── Modo VI + clipboard Wayland ───────────────────────────────
setw -g mode-keys vi
set -g set-clipboard on

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# ── Janelas e Panes ───────────────────────────────────────────
setw -g automatic-rename on
setw -g aggressive-resize on        # redimensiona para o menor cliente ativo

bind t new-window   -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"   # 'h' liberado para navegação

# ── Navegação estilo Vim (com prefixo) ────────────────────────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Navegação sem prefixo ─────────────────────────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Redimensionar panes (com prefixo + repeat) ────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Mover janelas ─────────────────────────────────────────────
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ── Misc ──────────────────────────────────────────────────────
bind m   command-prompt -p "Renomear janela:" "rename-window '%%'"
bind M   command-prompt -p "Renomear sessão:" "rename-session '%%'"
bind x   kill-pane
bind X   kill-window
bind q   confirm-before -p "Fechar sessão? (s/n)" kill-session

bind r source-file ~/.tmux.conf \; display-message "⚡ Config recarregada!"

# ── Plugins (TPM) ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# ── Tokyo Night — desabilita widgets nativos ──────────────────
set -g @tokyo-night-tmux_show_date    false
set -g @tokyo-night-tmux_show_time    false
set -g @tokyo-night-tmux_show_cpu     false
set -g @tokyo-night-tmux_show_ram     false
set -g @tokyo-night-tmux_show_network false
set -g @tokyo-night-tmux_show_battery false

# ── Inicializa TPM ────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'

# ── Barra de status — Catppuccin Mocha (combina com Starship) ─
# Paleta espelhada do seu starship.toml:
#   surface0=#313244  peach=#fab387   green=#a6e3a1
#   teal=#94e2d5      blue=#89b4fa    purple=#cba6f7
#   base=#1e1e2e      mantle=#181825  text=#cdd6f4
#   overlay0=#6c7086

set -g status-interval      1
set -g status-right-length  140
set -g status-left-length   80
set -g status-style         bg=default,fg=#cdd6f4

# Left: surface0 → seta peach → índice pane  (igual ao bloco os+username→directory do Starship)
set -g status-left \
  "#[bg=#313244,fg=#cdd6f4,bold]  #S #[bg=#fab387,fg=#313244]#[bg=#fab387,fg=#1e1e2e,bold] #I:#P #[bg=default,fg=#fab387]"

# Janelas inativas — texto apagado, sem destaque
set -g window-status-format          "#[bg=default,fg=#6c7086]  #I #W  "

# Janela ativa — powerline green → teal (igual ao bloco directory→git→langs do Starship)
set -g window-status-current-format \
  "#[bg=default,fg=#a6e3a1]#[bg=#a6e3a1,fg=#1e1e2e,bold] #I #[bg=#94e2d5,fg=#a6e3a1]#[bg=#94e2d5,fg=#1e1e2e,bold] #W #[bg=default,fg=#94e2d5]"

set -g window-status-separator ""

set -g status-right '#(~/.tmux/scripts/tmux-status.sh)'

# Bordas dos panes
set -g pane-border-style        fg=#45475a
set -g pane-active-border-style fg=#94e2d5

# Popup de mensagens
set -g message-style bg=#313244,fg=#fab387,bold

# =============================================================
